# Variable definitions for the weather probability model
# Phase 1: Monthly surface-only variables (~500 MB download)

variables:
  # -- Prediction targets --
  t2m:
    short_name: t2m
    long_name: "2 metre temperature"
    units: K
    level: surface
    role: target
    prob_head: gaussian   # Gaussian CRPS loss

  tp:
    short_name: tp
    long_name: "Total precipitation"
    units: m
    level: surface
    role: target
    prob_head: quantile    # Quantile loss (skewed distribution)

  # -- Slow boundary forcing variables (key for week-3+ predictability) --
  sst:
    short_name: sst
    long_name: "Sea surface temperature"
    units: K
    level: surface
    role: slow_forcing

  swvl1:
    short_name: swvl1
    long_name: "Volumetric soil water layer 1 (0-7cm)"
    units: m3 m-3
    level: surface
    role: slow_forcing

  sd:
    short_name: sd
    long_name: "Snow depth"
    units: m
    level: surface
    role: slow_forcing

  siconc:
    short_name: siconc
    long_name: "Sea ice area fraction"
    units: "(0-1)"
    level: surface
    role: slow_forcing

  # -- Atmospheric / surface state variables --
  msl:
    short_name: msl
    long_name: "Mean sea level pressure"
    units: Pa
    level: surface
    role: atmos_state

  u10:
    short_name: u10
    long_name: "10 metre U wind component"
    units: m s-1
    level: surface
    role: atmos_state

  v10:
    short_name: v10
    long_name: "10 metre V wind component"
    units: m s-1
    level: surface
    role: atmos_state

  # -- Radiative / energy budget variables --
  tisr:
    short_name: tisr
    long_name: "TOA incident solar radiation"
    units: J m-2
    level: surface
    role: external_forcing

  ssr:
    short_name: ssr
    long_name: "Surface net solar radiation"
    units: J m-2
    level: surface
    role: energy_budget

  str:
    short_name: str
    long_name: "Surface net thermal radiation"
    units: J m-2
    level: surface
    role: energy_budget

# Variable groups for easy reference
variable_groups:
  targets: [t2m, tp]
  slow_forcing: [sst, swvl1, sd, siconc]
  atmos_state: [msl, u10, v10]
  external_forcing: [tisr]
  energy_budget: [ssr, str]

# All variables in order (for data loading)
all_variables:
  - t2m
  - tp
  - sst
  - swvl1
  - sd
  - siconc
  - msl
  - u10
  - v10
  - tisr
  - ssr
  - str

# Grid specification
grid:
  lat_res: 1.5          # degrees
  lon_res: 1.5          # degrees
  n_lat: 121            # 180/1.5 + 1 (including poles)
  n_lon: 240            # 360/1.5
  lat_range: [-90, 90]
  lon_range: [0, 358.5]
